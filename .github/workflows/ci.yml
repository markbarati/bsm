name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Public repository secret check
        run: ./scripts/public-release-check.sh
      - name: Bash syntax
        run: |
          find . -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Python syntax
        run: |
          python -m compileall -q agent web tools
      - name: JavaScript syntax
        run: node --check web/static/app.js
      - name: Compose syntax
        run: |
          python -m pip install --quiet pyyaml
          python - <<'PY'
          import yaml
          yaml.safe_load(open('docker-compose.yml'))
          print('Compose YAML parsed')
          PY
